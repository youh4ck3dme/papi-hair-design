name: Deploy Cloud Functions

on:
  push:
    branches: [otvarackapril2026]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'scripts/assert-production-branch.mjs'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npm_config_script_shell: /bin/bash

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-functions-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: cd functions && npm ci

      - name: Verify production branch lock
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_ACTIONS: "true"
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        run: npm run guard:production-branch

      - name: Build functions
        run: cd functions && npm run build

      - name: Run functions tests
        run: cd functions && npm test

      - name: Deploy to Firebase
        env:
          FUNCTION_TARGETS: >-
            functions:claimBooking,functions:resolveBookingAccountState,functions:createPublicBooking,functions:saveSmtpConfig,functions:consentEvent,functions:recordClientDiagnostic,functions:listBookableProviders,functions:syncOfflineData,functions:importMigrationData,functions:normalizeMemberships,functions:createBookingHold,functions:confirmBooking,functions:getPublicAvailabilityConflicts,functions:adminUpdateBookingStatus,functions:adminCalendarQuickAction,functions:lookupBookingHistory,functions:cancelCustomerBooking,functions:queueRegistrationWelcomeEmail,functions:downloadBookingIcs,functions:cleanupExpiredHolds,functions:cleanupComplianceData,functions:rebuildPublicSnapshot,functions:bootstrapAdminAccess,functions:enforceSalonRoles,functions:createCheckoutSession,functions:onProfileWriteSyncEmployeePhoto,functions:onBusinessWrite,functions:onServiceWrite,functions:onServiceSubcategoryWrite,functions:onEmployeeWrite,functions:onBusinessHoursWrite,functions:onDateOverrideWrite,functions:onEmployeeServiceWrite
        run: |
          firebase deploy \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" \
            --only "firestore,${FUNCTION_TARGETS}"
