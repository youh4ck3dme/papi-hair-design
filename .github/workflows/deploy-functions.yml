name: Deploy Cloud Functions

on:
  push:
    branches: [otvarackapril2026]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'scripts/assert-production-branch.mjs'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  npm_config_script_shell: /bin/bash

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-functions-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: cd functions && npm ci

      - name: Verify production branch lock
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run guard:production-branch

      - name: Build functions
        run: cd functions && npm run build

      - name: Run functions tests
        run: cd functions && npm test

      - name: Deploy to Firebase
        run: |
          firebase deploy \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" \
            --only functions,firestore
