name: Deploy Firebase Hosting

on:
  push:
    branches: [otvarackapril2026]
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tailwind.config.ts"
      - "postcss.config.js"
      - "tsconfig*.json"
      - "firebase.json"
      - "scripts/check-env.mjs"
      - "scripts/assert-production-branch.mjs"
      - ".github/workflows/deploy-hosting.yml"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-hosting:
    name: Build and Deploy Hosting
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-hosting-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify production branch lock
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npm run guard:production-branch

      - name: Build web app
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_FIREBASE_FUNCTIONS_URL: ${{ secrets.VITE_FIREBASE_FUNCTIONS_URL }}
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting
        run: |
          firebase deploy \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --project "${{ secrets.VITE_FIREBASE_PROJECT_ID }}" \
            --only hosting
